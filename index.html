<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教學回饋問卷系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --primary: #1a3a2a;
  --accent: #4a9e6b;
  --accent2: #e8f5ee;
  --danger: #c0392b;
  --warn: #b45309;
  --text: #1c1c1c;
  --muted: #6b7280;
  --border: #e2e0d8;
  --radius: 12px;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-weight: 700; font-size: 15px; letter-spacing: .5px; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  background: none; border: none; color: rgba(255,255,255,.6);
  font-family: var(--sans); font-size: 13px; padding: 6px 14px;
  border-radius: 8px; cursor: pointer; transition: all .2s;
}
.nav-tab.active, .nav-tab:hover { background: rgba(255,255,255,.15); color: #fff; }

.page { display: none; padding: 28px 20px; max-width: 860px; margin: 0 auto; }
.page.active { display: block; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
}
.card-title {
  font-size: 14px; font-weight: 700; color: var(--primary);
  letter-spacing: .3px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.badge {
  background: var(--accent2); color: var(--accent);
  font-size: 11px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; font-family: var(--mono);
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d8a5c; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--sans); font-size: 14px; color: var(--text);
  background: var(--bg); transition: border-color .2s;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent); background: #fff;
}
label { font-size: 13px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 5px; }

.class-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.class-tag {
  background: var(--accent2); border: 1.5px solid #c5e8d4;
  color: var(--primary); font-size: 13px; font-weight: 500;
  padding: 5px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 6px;
}
.class-tag button {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 15px; line-height: 1; padding: 0 2px;
}
.class-tag button:hover { color: var(--danger); }

.qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 16px; }
.qr-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; text-align: center;
}
.qr-label { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.qr-url { font-size: 10px; color: var(--muted); font-family: var(--mono); word-break: break-all; margin-top: 8px; }

#page-survey { max-width: 600px; }
.survey-header { text-align: center; padding: 32px 20px 16px; }
.survey-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.survey-sub { font-size: 13px; color: var(--muted); }

.progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; }
.progress-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width .3s; }

.q-num { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
.q-text { font-size: 15px; font-weight: 500; margin-bottom: 12px; line-height: 1.55; }
.options { display: flex; flex-wrap: wrap; gap: 8px; }
.opt-btn {
  padding: 8px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--card);
  font-family: var(--sans); font-size: 13px;
  cursor: pointer; transition: all .15s; color: var(--text);
}
.opt-btn:hover { border-color: var(--accent); }
.opt-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.opt-btn.multi.selected { background: var(--accent2); border-color: var(--accent); color: var(--primary); }

.filter-badge {
  display: inline-block; font-size: 10px; background: #fef9c3;
  color: #854d0e; padding: 1px 7px; border-radius: 10px;
  font-weight: 600; margin-left: 6px; vertical-align: middle;
}

.submit-section { text-align: center; padding: 24px 0; }
.btn-submit {
  background: var(--primary); color: #fff;
  padding: 14px 40px; font-size: 16px; border-radius: 10px;
  border: none; font-family: var(--sans); font-weight: 700;
  cursor: pointer; transition: background .2s; width: 100%;
}
.btn-submit:hover { background: #2d5c41; }
.btn-submit:disabled { background: var(--muted); cursor: not-allowed; }

#success-view { text-align: center; padding: 60px 20px; display: none; }
.success-icon { font-size: 60px; margin-bottom: 16px; }
.success-title { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.success-sub { font-size: 14px; color: var(--muted); }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--primary); font-family: var(--mono); }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

.chart-wrap { position: relative; height: 260px; }
.filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-row select { width: auto; flex: 1; min-width: 140px; }

.excl-note {
  background: #fffbeb; border: 1px solid #fde68a;
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--warn); margin-bottom: 16px;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--accent2); color: var(--primary); font-weight: 700; padding: 8px 12px; text-align: left; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:hover td { background: #f9faf8; }
.tag-valid { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.tag-excl { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--primary); color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(10px);
  transition: all .3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err { background: var(--danger); }

.config-note {
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: #166534; margin-bottom: 16px;
}

@media (max-width: 600px) {
  nav { padding: 0 12px; }
  .page { padding: 16px 12px; }
  .opt-btn { font-size: 12px; padding: 7px 10px; }
  .btn-submit { font-size: 15px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">📋 教學回饋問卷</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('admin')">管理</button>
    <button class="nav-tab" onclick="showPage('survey')">填答</button>
    <button class="nav-tab" onclick="showPage('dashboard')">分析</button>
  </div>
</nav>

<!-- 管理頁 -->
<div class="page active" id="page-admin">
  <div class="card">
    <div class="card-title">⚙️ API 設定</div>
    <div class="config-note">API 金鑰與試算表 ID 已預先填入，確認後按儲存即可。</div>
    <div style="display:grid;gap:12px;">
      <div>
        <label>API 金鑰</label>
        <input type="text" id="cfg-apikey" placeholder="AIzaSy...">
      </div>
      <div>
        <label>Spreadsheet ID</label>
        <input type="text" id="cfg-sheetid" placeholder="1BxiMVs0X...">
      </div>
      <div>
        <label>工作表名稱</label>
        <input type="text" id="cfg-sheetname" placeholder="Sheet1">
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">💾 儲存設定</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏫 班級管理 <span class="badge" id="class-count">0 班</span></div>
    <div class="class-list" id="class-list"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="new-class" placeholder="例如：801、902、甲班" style="flex:1" onkeydown="if(event.key==='Enter')addClass()">
      <button class="btn btn-primary" onclick="addClass()">＋ 新增</button>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--muted);">新增後自動出現在學生填答的班級選單中。</div>
  </div>

  <div class="card">
    <div class="card-title">📱 QR Code 產生器</div>
    <div style="margin-bottom:12px;font-size:13px;color:var(--muted);">每個班級各自的 QR Code，學生掃描後班級自動帶入。</div>
    <button class="btn btn-outline" onclick="generateQR()">🔄 產生所有班級 QR Code</button>
    <div class="qr-grid" id="qr-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">🔗 通用填答連結</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">不帶班級的通用連結，學生進入後自行選班級：</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="survey-link" readonly style="font-family:var(--mono);font-size:12px;flex:1;">
      <button class="btn btn-outline btn-sm" onclick="copyLink()">複製</button>
    </div>
  </div>
</div>

<!-- 填答頁 -->
<div class="page" id="page-survey">
  <div id="survey-view">
    <div class="survey-header">
      <div class="survey-title">教學回饋問卷</div>
      <div class="survey-sub">您的意見將幫助老師改善教學，感謝填答！</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

    <div class="card">
      <div class="card-title">基本資料</div>
      <div style="display:grid;gap:12px;">
        <div>
          <label>班級 *</label>
          <select id="s-class" onchange="updateProgress()">
            <option value="">請選擇班級</option>
          </select>
        </div>
        <div>
          <label>座號 *</label>
          <select id="s-seat" onchange="updateProgress()">
            <option value="">請選擇座號</option>
          </select>
        </div>
      </div>
    </div>

    <div id="questions-wrap"></div>

    <div class="submit-section">
      <button class="btn-submit" id="submit-btn" onclick="submitSurvey()">送出問卷</button>
      <div style="margin-top:10px;font-size:12px;color:var(--muted);">送出前請確認所有題目已作答</div>
    </div>
  </div>

  <div id="success-view">
    <div class="success-icon">✅</div>
    <div class="success-title">感謝您的回饋！</div>
    <div class="success-sub">您的意見已成功送出，老師會認真參考。</div>
  </div>
</div>

<!-- 分析頁 -->
<div class="page" id="page-dashboard">
  <div class="card">
    <div class="card-title">🔍 篩選與操作</div>
    <div class="filter-row">
      <select id="f-class" onchange="loadDashboard()">
        <option value="">全部班級</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 重新整理</button>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇️ 匯出 CSV</button>
    </div>
  </div>

  <div class="excl-note" id="excl-note" style="display:none;"></div>
  <div class="stats-row" id="stats-row"></div>
  <div id="charts-wrap"></div>

  <div class="card">
    <div class="card-title">📝 第19題：其他原因（開放填寫）</div>
    <div id="open-answers" style="font-size:13px;color:var(--muted);"></div>
  </div>

  <div class="card">
    <div class="card-title">📋 所有填答紀錄</div>
    <div style="overflow-x:auto;">
      <table id="raw-table">
        <thead><tr><th>時間</th><th>班級</th><th>座號</th><th>狀態</th><th>第5題</th><th>第22題</th></tr></thead>
        <tbody id="raw-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const QUESTIONS = [
  { id:'q1',  text:'老師在觀念上的講解，能讓你理解的程度有多少？', opts:['0-20%','20-40%','40-60%','60-80%','80-100%'] },
  { id:'q2',  text:'老師在題目上的講解，能讓你理解的程度有多少？', opts:['0-20%','20-40%','40-60%','60-80%','80-100%'] },
  { id:'q3',  text:'你覺得老師上課內容的有趣程度是', opts:['很無聊','有點無聊','普通','有點有趣','很有趣'] },
  { id:'q4',  text:'你覺得老師上課內容對你成績的幫助是', opts:['沒有幫助','沒太多幫助','普通','有點幫助','很有幫助'] },
  { id:'q5',  text:'你這一堂上的課程是', opts:['國文','英文','數學','自然(理化生地)','社會(歷地公)'], filterVal:'自然(理化生地)' },
  { id:'q6',  text:'你上老師的課的時間大約是', opts:['1個月內','1-3個月','3-6個月','6-12個月','12個月以上'] },
  { id:'q7',  text:'你一般自然科(理化生地)的段考成績大多落在', opts:['60分以下','60-70分','70-80分','80-90分','90分以上'] },
  { id:'q8',  text:'你對於上課時老師點你回答問題的感受是', opts:['很不喜歡','有點不喜歡','普通','有點喜歡','很喜歡'] },
  { id:'q9',  text:'對於大部分回家作業的量，你覺得', opts:['很少','有點少','普通','有點多','很多'] },
  { id:'q10', text:'你一般會花多少時間在處理回家作業', opts:['5分鐘內','5-10分鐘','10-15分鐘','15-20分鐘','20分鐘以上'] },
  { id:'q11', text:'在一次段考的範圍內，會讓你覺得困難的內容是', opts:['非常多','有點多','普通','有點少','非常少'] },
  { id:'q12', text:'你在私下問老師問題時，老師的回答與講解讓你理解的程度有多少？', opts:['0-20%','20-40%','40-60%','60-80%','80-100%'] },
  { id:'q13', text:'當你上課時有某些部分不理解時，你會及時尋求老師的幫助嗎？', opts:['完全不會','有時候會','一定會'] },
  { id:'q14', text:'在你及時尋求老師幫助後，能讓你理解的程度有多少？', opts:['0-20%','20-40%','40-60%','60-80%','80-100%'] },
  { id:'q15', text:'在聽老師講解觀念或題目時，你覺得老師的語速使你聽起來', opts:['非常慢','有點慢','普通','有點快','非常快'] },
  { id:'q16', text:'當老師在上課時針對某些內容作比喻時，比喻方式能幫助你更清楚內容？', opts:['每次都不行','大多不行','普通','大多可以','每次都可以'] },
  { id:'q17', text:'在你需要做筆記時，老師的板書對你做筆記的清楚程度？', opts:['0-20%','20-40%','40-60%','60-80%','80-100%'] },
  { id:'q18', text:'對於老師每講完一種類型的題目，立即給你時間練習相同類型題目是', opts:['完全沒幫助','沒有幫助','普通','有幫助','非常有幫助'] },
  { id:'q19', text:'讓你選擇繼續上老師課的原因可能是？（可複選）', opts:['覺得老師上課有趣','老師能有效解決你的問題','父母決定無法抗拒','其他'], multi:true, hasOther:true },
  { id:'q20a', text:'你覺得老師上課的內容與學校老師課程相比，相似度是', opts:['完全不同','有點不同','普通','有點相同','完全相同'] },
  { id:'q20b', text:'你覺得老師上課的內容與學校老師課程相比，難易度是', opts:['非常困難','有點困難','普通','有點簡單','非常簡單'] },
  { id:'q21', text:'老師的教學進度與學校進度相比，大多情況是', opts:['慢2小節以上','慢1-2小節','剛剛好','快1-2小節','快2小節以上'] },
  { id:'q22', text:'依你理解的觀念下，與物質的密度定義最相似的說法是', opts:['甜蜜程度','秘密程度','私密程度','緊密程度'], filterVal:'緊密程度' },
];

const HEADERS = ['timestamp','class','seat','valid',
  ...QUESTIONS.map(q=>q.id), 'q19_other'];

let CONFIG = { apikey:'AIzaSyBevIb32BpTrcTFr25cVHpa5u-rk-VSTbA', sheetid:'1dC-lO6C8i0qWZgdLJfD4AWGFMDdYThXMtI8ElacArok', sheetname:'Sheet1' };
let CLASSES = [];
let answers = {};
let chartInstances = [];

// ── INIT ──
function init() {
  loadStorage();
  renderClasses();
  renderSurveyQuestions();
  updateSurveyLink();
  checkURLParams();
  renderSeatOptions(45);
}

function loadStorage() {
  try {
    const cfg = localStorage.getItem('survey_config');
    if (cfg) CONFIG = { ...CONFIG, ...JSON.parse(cfg) };
    const cls = localStorage.getItem('survey_classes');
    if (cls) CLASSES = JSON.parse(cls);
  } catch(e) {}
  document.getElementById('cfg-apikey').value = CONFIG.apikey || '';
  document.getElementById('cfg-sheetid').value = CONFIG.sheetid || '';
  document.getElementById('cfg-sheetname').value = CONFIG.sheetname || 'Sheet1';
}

function saveConfig() {
  CONFIG.apikey = document.getElementById('cfg-apikey').value.trim();
  CONFIG.sheetid = document.getElementById('cfg-sheetid').value.trim();
  CONFIG.sheetname = document.getElementById('cfg-sheetname').value.trim() || 'Sheet1';
  localStorage.setItem('survey_config', JSON.stringify(CONFIG));
  updateSurveyLink();
  showToast('設定已儲存');
}

// ── CLASSES ──
function addClass() {
  const input = document.getElementById('new-class');
  const name = input.value.trim();
  if (!name) return;
  if (CLASSES.includes(name)) { showToast('班級已存在', true); return; }
  CLASSES.push(name);
  localStorage.setItem('survey_classes', JSON.stringify(CLASSES));
  renderClasses();
  input.value = '';
  showToast('已新增班級：' + name);
}

function removeClass(name) {
  if (!confirm(`確定刪除班級「${name}」？`)) return;
  CLASSES = CLASSES.filter(c => c !== name);
  localStorage.setItem('survey_classes', JSON.stringify(CLASSES));
  renderClasses();
  showToast('已刪除班級：' + name);
}

function renderClasses() {
  const list = document.getElementById('class-list');
  if (CLASSES.length === 0) {
    list.innerHTML = '<span style="font-size:13px;color:var(--muted);">尚未新增班級</span>';
  } else {
    list.innerHTML = CLASSES.map(c =>
      `<div class="class-tag">${c}<button onclick="removeClass('${c}')" title="刪除班級">×</button></div>`
    ).join('');
  }
  document.getElementById('class-count').textContent = CLASSES.length + ' 班';

  // sync survey select
  const sel = document.getElementById('s-class');
  const cur = sel.value;
  sel.innerHTML = '<option value="">請選擇班級</option>' +
    CLASSES.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');

  // sync dashboard filter
  const fsel = document.getElementById('f-class');
  const fcur = fsel.value;
  fsel.innerHTML = '<option value="">全部班級</option>' +
    CLASSES.map(c => `<option value="${c}"${c===fcur?' selected':''}>${c}</option>`).join('');
}

function renderSeatOptions(max) {
  const sel = document.getElementById('s-seat');
  sel.innerHTML = '<option value="">請選擇座號</option>' +
    Array.from({length:max}, (_,i) => `<option value="${i+1}">${i+1}</option>`).join('');
}

// ── QR CODE ──
function generateQR() {
  const grid = document.getElementById('qr-grid');
  grid.innerHTML = '';
  if (!CLASSES.length) { showToast('請先新增班級', true); return; }
  const base = location.href.split('?')[0];
  CLASSES.forEach(cls => {
    const url = `${base}?page=survey&class=${encodeURIComponent(cls)}`;
    const div = document.createElement('div');
    div.className = 'qr-item';
    const qid = 'qr-' + cls.replace(/[^a-zA-Z0-9]/g,'_');
    div.innerHTML = `<div class="qr-label">${cls}</div><div id="${qid}"></div><div class="qr-url">${url}</div>`;
    grid.appendChild(div);
    new QRCode(document.getElementById(qid), {
      text: url, width: 140, height: 140,
      colorDark: '#1a3a2a', colorLight: '#ffffff'
    });
  });
}

function updateSurveyLink() {
  document.getElementById('survey-link').value = location.href.split('?')[0] + '?page=survey';
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('survey-link').value).then(() => showToast('連結已複製'));
}

// ── URL PARAMS ──
function checkURLParams() {
  const params = new URLSearchParams(location.search);
  if (params.get('page') === 'survey') {
    showPage('survey');
    const cls = params.get('class');
    if (cls) {
      const sel = document.getElementById('s-class');
      if (!Array.from(sel.options).some(o => o.value === cls)) {
        sel.appendChild(new Option(cls, cls));
      }
      sel.value = cls;
    }
  }
}

// ── SURVEY RENDER ──
function renderSurveyQuestions() {
  const wrap = document.getElementById('questions-wrap');
  wrap.innerHTML = '';
  QUESTIONS.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginBottom = '12px';

    let optsHTML;
    if (q.multi) {
      optsHTML = `<div class="options">` +
        q.opts.map(o =>
          `<button class="opt-btn multi" data-val="${o}" onclick="toggleMulti(this,'${q.id}')">${o}</button>`
        ).join('') + `</div>`;
      if (q.hasOther) {
        optsHTML += `<div id="other-wrap-${q.id}" style="display:none;margin-top:10px;">
          <input type="text" id="other-input-${q.id}" placeholder="請說明其他原因…" oninput="updateProgress()">
        </div>`;
      }
    } else {
      optsHTML = `<div class="options">` +
        q.opts.map(o =>
          `<button class="opt-btn" data-val="${o}" onclick="selectOpt(this,'${q.id}')">${o}</button>`
        ).join('') + `</div>`;
    }

    div.innerHTML = `
      <div class="q-num">第 ${idx+1} 題</div>
      <div class="q-text">${q.text}</div>
      ${optsHTML}
    `;
    wrap.appendChild(div);
  });
}

function selectOpt(btn, qid) {
  btn.closest('.options').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[qid] = btn.getAttribute('data-val');
  updateProgress();
}

function toggleMulti(btn, qid) {
  btn.classList.toggle('selected');
  const selected = [...btn.closest('.options').querySelectorAll('.opt-btn.selected')]
    .map(b => b.getAttribute('data-val'));
  answers[qid] = selected;
  const otherWrap = document.getElementById('other-wrap-' + qid);
  if (otherWrap) otherWrap.style.display = selected.includes('其他') ? 'block' : 'none';
  updateProgress();
}

function updateProgress() {
  const cls = document.getElementById('s-class').value;
  const seat = document.getElementById('s-seat').value;
  let filled = (cls ? 1 : 0) + (seat ? 1 : 0);
  QUESTIONS.forEach(q => {
    const a = answers[q.id];
    if (q.multi) { if (a && a.length > 0) filled++; }
    else { if (a) filled++; }
  });
  document.getElementById('progress-bar').style.width = (filled / (QUESTIONS.length + 2) * 100) + '%';
}

// ── SUBMIT ──
async function submitSurvey() {
  const cls = document.getElementById('s-class').value;
  const seat = document.getElementById('s-seat').value;
  if (!cls || !seat) { showToast('請先選擇班級與座號', true); return; }

  const missing = [];
  QUESTIONS.forEach((q, idx) => {
    const a = answers[q.id];
    if (q.multi ? (!a || !a.length) : !a) missing.push(`第${idx+1}題`);
  });
  if (missing.length) {
    showToast('尚未作答：' + missing.slice(0,3).join('、') + (missing.length>3?'…':''), true);
    return;
  }

  const valid5  = answers['q5']  === '自然(理化生地)';
  const valid22 = answers['q22'] === '緊密程度';
  const isValid = valid5 && valid22;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '送出中…';

  const ts = new Date().toLocaleString('zh-TW');
  const q19other = document.getElementById('other-input-q19')?.value?.trim() || '';
  const row = [
    ts, cls, seat, isValid ? '有效' : '排除',
    ...QUESTIONS.map(q => {
      const a = answers[q.id];
      return Array.isArray(a) ? a.join('、') : (a || '');
    }),
    q19other
  ];

  try {
    await ensureHeaders();
    const resp = await appendRow(row);
    if (resp.ok) {
      document.getElementById('survey-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    } else {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err?.error?.message || 'HTTP ' + resp.status);
    }
  } catch(e) {
    showToast('送出失敗：' + e.message, true);
    btn.disabled = false; btn.textContent = '送出問卷';
  }
}

async function ensureHeaders() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetid}/values/${encodeURIComponent(CONFIG.sheetname)}!A1?key=${CONFIG.apikey}`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.values || !d.values[0] || d.values[0].length === 0) {
    await appendRow(HEADERS);
  }
}

async function appendRow(row) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetid}/values/${encodeURIComponent(CONFIG.sheetname)}!A1:append?valueInputOption=USER_ENTERED&key=${CONFIG.apikey}`;
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [row] })
  });
}

// ── DASHBOARD ──
const SCORE_MAP = {
  '0-20%':1,'20-40%':2,'40-60%':3,'60-80%':4,'80-100%':5,
  '很無聊':1,'有點無聊':2,'普通':3,'有點有趣':4,'很有趣':5,
  '沒有幫助':1,'沒太多幫助':2,'有點幫助':4,'很有幫助':5,
  '很不喜歡':1,'有點不喜歡':2,'有點喜歡':4,'很喜歡':5,
  '很少':1,'有點少':2,'有點多':4,'很多':5,
  '完全沒幫助':1,'沒有幫助':2,'有幫助':4,'非常有幫助':5,
  '非常困難':1,'有點困難':2,'有點簡單':4,'非常簡單':5,
  '完全不行':1,'每次都不行':1,'大多不行':2,'大多可以':4,'每次都可以':5,
  '完全不同':1,'有點不同':2,'有點相同':4,'完全相同':5,
  '非常少':1,'有點少':2,'非常多':5,'有點多':4,
  '60分以下':1,'60-70分':2,'70-80分':3,'80-90分':4,'90分以上':5,
  '1個月內':1,'1-3個月':2,'3-6個月':3,'6-12個月':4,'12個月以上':5,
  '5分鐘內':1,'5-10分鐘':2,'10-15分鐘':3,'15-20分鐘':4,'20分鐘以上':5,
  '完全不會':1,'有時候會':3,'一定會':5,
  '非常慢':1,'有點慢':2,'有點快':4,'非常快':5,
  '慢2小節以上':1,'慢1-2小節':2,'剛剛好':3,'快1-2小節':4,'快2小節以上':5,
};

async function loadDashboard() {
  showToast('載入資料中…');
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetid}/values/${encodeURIComponent(CONFIG.sheetname)}?key=${CONFIG.apikey}`;
    const r = await fetch(url);
    const d = await r.json();
    if (!d.values || d.values.length < 2) { showToast('尚無填答資料', true); return; }

    const headers = d.values[0];
    const rows = d.values.slice(1).map(row => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = row[i] || '');
      return obj;
    });

    const filterCls = document.getElementById('f-class').value;
    const filtered = filterCls ? rows.filter(r => r.class === filterCls) : rows;
    const validRows = filtered.filter(r => r.valid === '有效');
    const exclRows  = filtered.filter(r => r.valid === '排除');

    renderStats(filtered.length, validRows.length, exclRows.length);
    renderExclNote(exclRows.length, filtered.length);
    renderCharts(validRows);
    renderOpenAnswers(validRows);
    renderRawTable(filtered);
    showToast('資料已更新');
  } catch(e) {
    showToast('載入失敗：' + e.message, true);
  }
}

function renderStats(total, valid, excl) {
  const rate = total ? Math.round(valid / total * 100) : 0;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">總填答數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${valid}</div><div class="stat-label">有效問卷</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${excl}</div><div class="stat-label">排除問卷</div></div>
    <div class="stat-card"><div class="stat-num">${rate}%</div><div class="stat-label">有效率</div></div>
  `;
}

function renderExclNote(excl, total) {
  const note = document.getElementById('excl-note');
  if (excl > 0) {
    note.style.display = 'block';
    note.textContent = `⚠️ 共排除 ${excl} 份（共 ${total} 份）：第5題未選「自然(理化生地)」或第22題未選「緊密程度」的問卷不計入分析。`;
  } else {
    note.style.display = 'none';
  }
}

function renderCharts(rows) {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];
  const wrap = document.getElementById('charts-wrap');
  wrap.innerHTML = '';
  if (!rows.length) return;

  // average bar chart — exclude multi, filter questions
  const scoreQs = QUESTIONS.filter(q => !q.multi && !q.filterVal);
  const labels = scoreQs.map((_, i) => `Q${QUESTIONS.indexOf(scoreQs[i]) + 1}`);
  const fullLabels = scoreQs.map(q => q.text.slice(0, 22) + (q.text.length > 22 ? '…' : ''));
  const avgs = scoreQs.map(q => {
    const vals = rows.map(r => SCORE_MAP[r[q.id]]).filter(v => v != null);
    return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : 0;
  });

  const card1 = document.createElement('div');
  card1.className = 'card';
  card1.innerHTML = '<div class="card-title">📊 各題平均分數（有效問卷，1–5分）</div><div class="chart-wrap"><canvas id="chart-avg"></canvas></div>';
  wrap.appendChild(card1);

  chartInstances.push(new Chart(document.getElementById('chart-avg'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '平均分',
        data: avgs,
        backgroundColor: '#4a9e6b55',
        borderColor: '#4a9e6b',
        borderWidth: 1.5,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { title: (items) => fullLabels[items[0].dataIndex] } }
      },
      scales: {
        y: { min: 0, max: 5, ticks: { stepSize: 1 } },
        x: { ticks: { font: { size: 11 } } }
      }
    }
  }));

  // q19 doughnut
  const q19tally = {};
  rows.forEach(r => {
    (r['q19'] || '').split('、').forEach(a => {
      if (a && a !== '其他') q19tally[a] = (q19tally[a]||0)+1;
    });
  });
  if (Object.keys(q19tally).length) {
    const card2 = document.createElement('div');
    card2.className = 'card';
    card2.innerHTML = '<div class="card-title">📊 第19題：繼續上課原因（複選）</div><div class="chart-wrap"><canvas id="chart-q19"></canvas></div>';
    wrap.appendChild(card2);
    chartInstances.push(new Chart(document.getElementById('chart-q19'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(q19tally),
        datasets: [{ data: Object.values(q19tally), backgroundColor: ['#4a9e6b','#1a3a2a','#e8b84b','#9dcfb0'], borderWidth: 2 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    }));
  }
}

function renderOpenAnswers(rows) {
  const div = document.getElementById('open-answers');
  const list = rows.map(r => r['q19_other']).filter(a => a && a.trim());
  if (!list.length) { div.textContent = '（無開放式填寫）'; return; }
  div.innerHTML = list.map((a,i) =>
    `<div style="padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:8px;">#${i+1}</span>${a}
    </div>`
  ).join('');
}

function renderRawTable(rows) {
  const tbody = document.getElementById('raw-tbody');
  tbody.innerHTML = [...rows].reverse().map(r =>
    `<tr>
      <td style="font-family:var(--mono);font-size:11px;white-space:nowrap;">${r.timestamp||''}</td>
      <td>${r.class||''}</td>
      <td>${r.seat||''}</td>
      <td><span class="${r.valid==='有效'?'tag-valid':'tag-excl'}">${r.valid||''}</span></td>
      <td style="font-size:12px;">${r.q5||''}</td>
      <td style="font-size:12px;">${r.q22||''}</td>
    </tr>`
  ).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">尚無資料</td></tr>';
}

function exportCSV() {
  const rows = [...document.getElementById('raw-table').querySelectorAll('tr')];
  const csv = rows.map(tr =>
    [...tr.querySelectorAll('th,td')].map(td => '"' + td.textContent.replace(/"/g,'""') + '"').join(',')
  ).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8;' }));
  a.download = `問卷資料_${new Date().toLocaleDateString('zh-TW')}.csv`;
  a.click();
}

// ── UTILS ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  ['admin','survey','dashboard'].forEach((n,i) => {
    if (n===name) document.querySelectorAll('.nav-tab')[i].classList.add('active');
  });
  if (name === 'dashboard') loadDashboard();
}

let toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
